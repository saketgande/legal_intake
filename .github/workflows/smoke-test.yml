name: Production smoke test

# Two assertions against the deployed production URL:
#   1. GET /api/health returns 200 — the deployment is alive (public
#      path, exempt from the Auth0 middleware).
#   2. An anonymous POST to /api/claude does NOT return 200 — the auth
#      wall is up. Since Auth0 went live in production, anonymous
#      requests 307-redirect to /api/auth/login; if this probe ever
#      gets a 200 the proxy is publicly exposed (API-key burner) and
#      the run fails loudly.
# The pre-Auth0 version of this workflow asserted a 200 from
# /api/claude to catch ANTHROPIC_API_KEY regressions; that check needs
# a session now and moved out of scope for an unauthenticated probe.
#
# Configuration (one-time, per repo):
#   Repo → Settings → Secrets and variables → Actions → Variables tab
#     PRODUCTION_URL = https://your-vercel-production-domain  (no trailing slash)
#
# If PRODUCTION_URL is not set or malformed, the workflow fails fast with
# a clear message — no silent passes.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 08:15 UTC — catches quiet breakage (e.g. key rotation
    # that didn't make it to Vercel).
    - cron: "15 8 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Normalize and validate PRODUCTION_URL
        id: url
        env:
          RAW_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          # Show the value with bracket delimiters so trailing whitespace
          # or invisible chars are visible in the log.
          echo "Raw value: [${RAW_URL}]"

          # Strip whitespace (leading, trailing, embedded newlines/CRs).
          url=$(printf '%s' "$RAW_URL" | tr -d '[:space:]')

          if [ -z "$url" ]; then
            echo "::error::PRODUCTION_URL repo variable is not set (or is empty after whitespace strip)."
            echo "Set it at: Settings → Secrets and variables → Actions → **Variables tab**"
            echo "(Secrets tab won't work — 'vars.PRODUCTION_URL' only reads from the Variables tab.)"
            echo "Example value: https://aegis.vercel.app"
            exit 1
          fi

          # Auto-prepend https:// if the scheme is missing.
          case "$url" in
            http://*|https://*) ;;
            *) url="https://$url" ;;
          esac

          # Strip trailing slash for predictable concatenation.
          url="${url%/}"

          # Final sanity check — must parse as http(s)://host[:port][/path]
          if ! printf '%s' "$url" | grep -qE '^https?://[A-Za-z0-9._-]+(:[0-9]+)?(/.*)?$'; then
            echo "::error::PRODUCTION_URL is malformed after normalization: [$url]"
            echo "Expected format: https://your-domain.example.com"
            exit 1
          fi

          echo "Normalized: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Wait for Vercel deploy to settle
        if: github.event_name == 'push'
        run: sleep 90

      - name: Poll /api/health until 200 (max ~5 min)
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          echo "Target: $URL/api/health"

          for attempt in $(seq 1 20); do
            status=$(curl -sS -o /tmp/health.json -w "%{http_code}" \
              "$URL/api/health" 2>/tmp/curl.err)
            rc=$?

            if [ "$rc" != "0" ]; then
              echo "Attempt $attempt: curl exited $rc"
              sed -n '1,3p' /tmp/curl.err
            else
              echo "Attempt $attempt: HTTP $status"
            fi

            if [ "$status" = "200" ]; then
              echo "::notice::Deployment is alive — /api/health returned 200"
              head -c 300 /tmp/health.json
              echo
              exit 0
            fi

            sleep 15
          done

          echo "::error::Smoke test failed — /api/health never returned 200 within the retry window"
          echo "Last response body:"
          cat /tmp/health.json 2>/dev/null || echo "(no body — curl never completed a request)"
          exit 1

      - name: Assert the auth wall is up on /api/claude
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          echo "Target: $URL/api/claude (anonymous — expecting a redirect/deny)"

          PAYLOAD='{"model":"claude-sonnet-5","max_tokens":5,"messages":[{"role":"user","content":"ping"}]}'
          status=$(curl -sS -o /tmp/claude.json -w "%{http_code}" \
            -X POST "$URL/api/claude" \
            -H "content-type: application/json" \
            -d "$PAYLOAD")
          echo "Anonymous POST /api/claude: HTTP $status"

          case "$status" in
            200)
              echo "::error::SECURITY: anonymous /api/claude returned 200 — the Auth0 wall is down and the Claude proxy is publicly exposed."
              head -c 300 /tmp/claude.json
              exit 1
              ;;
            307|302|401|403)
              echo "::notice::Auth wall confirmed — anonymous request was refused (HTTP $status)."
              ;;
            *)
              echo "::warning::Unexpected status $status from anonymous /api/claude (wall still effectively up — not a 200). Body:"
              head -c 300 /tmp/claude.json || true
              ;;
          esac

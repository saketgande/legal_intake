name: Production smoke test

# Sends a trivial POST to /api/claude on the deployed production URL and
# asserts a 200. Catches env-var regressions (ANTHROPIC_API_KEY missing
# from Vercel production) and proxy breakage before users notice via a
# broken Copilot.
#
# Configuration (one-time, per repo):
#   Repo → Settings → Secrets and variables → Actions → Variables tab
#     PRODUCTION_URL = https://your-vercel-production-domain  (no trailing slash)
#
# If PRODUCTION_URL is not set or malformed, the workflow fails fast with
# a clear message — no silent passes.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 08:15 UTC — catches quiet breakage (e.g. key rotation
    # that didn't make it to Vercel).
    - cron: "15 8 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Normalize and validate PRODUCTION_URL
        id: url
        env:
          RAW_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          # Show the value with bracket delimiters so trailing whitespace
          # or invisible chars are visible in the log.
          echo "Raw value: [${RAW_URL}]"

          # Strip whitespace (leading, trailing, embedded newlines/CRs).
          url=$(printf '%s' "$RAW_URL" | tr -d '[:space:]')

          if [ -z "$url" ]; then
            echo "::error::PRODUCTION_URL repo variable is not set (or is empty after whitespace strip)."
            echo "Set it at: Settings → Secrets and variables → Actions → **Variables tab**"
            echo "(Secrets tab won't work — 'vars.PRODUCTION_URL' only reads from the Variables tab.)"
            echo "Example value: https://aegis.vercel.app"
            exit 1
          fi

          # Auto-prepend https:// if the scheme is missing.
          case "$url" in
            http://*|https://*) ;;
            *) url="https://$url" ;;
          esac

          # Strip trailing slash for predictable concatenation.
          url="${url%/}"

          # Final sanity check — must parse as http(s)://host[:port][/path]
          if ! printf '%s' "$url" | grep -qE '^https?://[A-Za-z0-9._-]+(:[0-9]+)?(/.*)?$'; then
            echo "::error::PRODUCTION_URL is malformed after normalization: [$url]"
            echo "Expected format: https://your-domain.example.com"
            exit 1
          fi

          echo "Normalized: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Wait for Vercel deploy to settle
        if: github.event_name == 'push'
        run: sleep 90

      - name: Poll /api/claude until 200 (max ~5 min)
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          echo "Target: $URL/api/claude"

          # Minimal valid Anthropic Messages payload — max_tokens:5 keeps
          # this test cheap. If the proxy + key work, Anthropic returns
          # 200 with a content array.
          PAYLOAD='{"model":"claude-sonnet-4-6","max_tokens":5,"messages":[{"role":"user","content":"ping"}]}'

          for attempt in $(seq 1 20); do
            status=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
              -X POST "$URL/api/claude" \
              -H "content-type: application/json" \
              -d "$PAYLOAD" 2>/tmp/curl.err)
            rc=$?

            if [ "$rc" != "0" ]; then
              echo "Attempt $attempt: curl exited $rc"
              sed -n '1,3p' /tmp/curl.err
            else
              echo "Attempt $attempt: HTTP $status"
            fi

            if [ "$status" = "200" ]; then
              echo "::notice::Smoke test passed — /api/claude returned 200"
              head -c 300 /tmp/body.json
              echo
              exit 0
            fi

            if [ "$status" = "500" ] && grep -q "not configured" /tmp/body.json 2>/dev/null; then
              echo "::error::Proxy reports ANTHROPIC_API_KEY not configured in Vercel production env."
              cat /tmp/body.json
              exit 1
            fi

            sleep 15
          done

          echo "::error::Smoke test failed — /api/claude never returned 200 within the retry window"
          echo "Last response body:"
          cat /tmp/body.json 2>/dev/null || echo "(no body — curl never completed a request)"
          exit 1
